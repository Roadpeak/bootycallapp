name: Trigger Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  trigger-deploy:
    name: Trigger butical_api deploy
    runs-on: ubuntu-latest
    steps:
      - name: Dispatch deploy to butical_api
        uses: peter-evans/repository-dispatch@v3
        with:
          token: ${{ secrets.DEPLOY_DISPATCH_TOKEN }}
          repository: salvatoluis/butical_api
          event-type: deploy
