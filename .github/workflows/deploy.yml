name: Build & Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  build-push:
    name: Build & push web image
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          build-args: |
            NEXT_PUBLIC_API_BASE_URL=${{ secrets.NEXT_PUBLIC_API_BASE_URL }}
            NEXT_PUBLIC_WS_URL=${{ secrets.NEXT_PUBLIC_WS_URL }}
            NEXT_PUBLIC_APP_URL=${{ secrets.NEXT_PUBLIC_APP_URL }}
          tags: |
            ghcr.io/roadpeak/bootycallapp:latest
            ghcr.io/roadpeak/bootycallapp:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    name: Deploy web to server
    needs: build-push
    runs-on: ubuntu-latest
    permissions:
      packages: read

    steps:
      - name: Setup SSH
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.SSH_PRIVATE_KEY }}

      - name: Add server to known hosts
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan -p 2222 -H ${{ secrets.SERVER_IP }} >> ~/.ssh/known_hosts

      - name: Authenticate server with GHCR
        env:
          GHCR_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          echo "$GHCR_TOKEN" | ssh -p 2222 ${{ secrets.SERVER_USER }}@${{ secrets.SERVER_IP }} \
            "docker login ghcr.io -u ${{ github.repository_owner }} --password-stdin"

      - name: Pull image, restart, health check & rollback
        run: |
          ssh -p 2222 ${{ secrets.SERVER_USER }}@${{ secrets.SERVER_IP }} << 'DEPLOY_EOF'
            set -e
            cd /opt/docker/buticall/butical_api
            COMPOSE="docker compose -f docker-compose.yml -f docker-compose.prod.yml"
            HEALTH_URL="https://lovebiteglobal.com"
            IMAGE="ghcr.io/roadpeak/bootycallapp"

            # Step 1: Tag current as rollback
            echo "=== Step 1: Preserving rollback image ==="
            docker tag "${IMAGE}:latest" "${IMAGE}:rollback" 2>/dev/null || echo "  No existing latest to tag as rollback"

            # Step 2: Pull new image
            echo ""
            echo "=== Step 2: Pulling new web image ==="
            $COMPOSE pull web

            # Step 3: Restart web container
            echo ""
            echo "=== Step 3: Restarting web container ==="
            $COMPOSE up -d --no-deps --force-recreate web

            # Step 4: Health check
            echo ""
            echo "=== Step 4: Health check ==="
            sleep 15
            HEALTHY=false
            for i in 1 2 3 4 5; do
              HTTP_CODE=$(curl -sf -o /dev/null -w '%{http_code}' "$HEALTH_URL" 2>/dev/null || echo "000")
              WEB_UP=$(docker ps --filter "name=butical_web" --filter "status=running" --format '{{.Names}}' | head -1)

              if [ "$HTTP_CODE" = "200" ] && [ -n "$WEB_UP" ]; then
                echo "  Attempt $i: HEALTHY (HTTP $HTTP_CODE, web=$WEB_UP)"
                HEALTHY=true
                break
              fi
              echo "  Attempt $i: NOT READY (HTTP $HTTP_CODE, web=$WEB_UP)"
              sleep 15
            done

            # Step 5: Cleanup or rollback
            if [ "$HEALTHY" = "true" ]; then
              echo ""
              echo "=== Step 5: Deploy SUCCESS — cleaning up old images ==="
              docker images "${IMAGE}" --format '{{.Tag}}' | \
                grep -v '^latest$\|^rollback$' | \
                xargs -r -I{} docker rmi "${IMAGE}:{}" 2>/dev/null || true
              docker image prune -f 2>/dev/null || true
              $COMPOSE ps
            else
              echo ""
              echo "=== Step 5: Deploy FAILED — rolling back ==="
              docker tag "${IMAGE}:rollback" "${IMAGE}:latest" 2>/dev/null || true
              $COMPOSE up -d --no-deps --force-recreate web
              sleep 15
              ROLLBACK_CODE=$(curl -sf -o /dev/null -w '%{http_code}' "$HEALTH_URL" 2>/dev/null || echo "000")
              echo "  Rollback health check: HTTP $ROLLBACK_CODE"
              exit 1
            fi
          DEPLOY_EOF

      - name: Cleanup Docker build cache
        if: success()
        run: |
          ssh -p 2222 ${{ secrets.SERVER_USER }}@${{ secrets.SERVER_IP }} << 'CLEANUP_EOF'
            docker builder prune -af --filter "until=24h" 2>/dev/null || true
            echo "=== Disk usage ===" && df -h /
            echo "=== Images ===" && docker images --format "table {{.Repository}}\t{{.Tag}}\t{{.Size}}"
          CLEANUP_EOF
